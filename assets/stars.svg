<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" width="100" height="20">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stars -->
  <g fill="url(#starGrad)" filter="url(#glow)">
    <polygon points="5,2 6,5 9,5 7,7 8,10 5,8 2,10 3,7 1,5 4,5" transform="scale(0.8) translate(5,0)"/>
    <polygon points="25,2 26,5 29,5 27,7 28,10 25,8 22,10 23,7 21,5 24,5" transform="scale(0.8) translate(15,0)"/>
    <polygon points="45,2 46,5 49,5 47,7 48,10 45,8 42,10 43,7 41,5 44,5" transform="scale(0.8) translate(25,0)"/>
    <polygon points="65,2 66,5 69,5 67,7 68,10 65,8 62,10 63,7 61,5 64,5" transform="scale(0.8) translate(35,0)"/>
    <polygon points="85,2 86,5 89,5 87,7 88,10 85,8 82,10 83,7 81,5 84,5" transform="scale(0.8) translate(45,0)"/>
  </g>
  
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>