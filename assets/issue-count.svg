<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="issueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="120" height="40" rx="8" ry="8" fill="#0d0d0d" stroke="url(#issueGrad)" stroke-width="2"/>
  
  <!-- Issue icon (exclamation mark in circle) -->
  <g transform="translate(12, 10) scale(0.5)" fill="url(#issueGrad)" filter="url(#glow)">
    <circle cx="12" cy="12" r="10" stroke="url(#issueGrad)" stroke-width="2" fill="none"/>
    <text x="12" y="16" font-family="Arial" font-size="14" font-weight="bold" fill="url(#issueGrad)" text-anchor="middle">!</text>
  </g>
  
  <!-- Issue count text -->
  <text x="45" y="18" font-family="monospace" font-size="12" font-weight="bold" fill="#ff6b6b">0</text>
  <text x="45" y="28" font-family="monospace" font-size="8" fill="#ffd93d">ISSUES</text>
  
  <!-- Decorative line -->
  <line x1="35" y1="10" x2="35" y2="30" stroke="url(#issueGrad)" stroke-width="1"/>
</svg>