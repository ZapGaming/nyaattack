<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="starCountGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="0" y="0" width="120" height="40" rx="8" ry="8" fill="#0d0d0d" stroke="url(#starCountGrad)" stroke-width="2"/>
  
  <!-- Star icon -->
  <g transform="translate(10, 10) scale(0.6)" fill="url(#starCountGrad)" filter="url(#glow)">
    <polygon points="10,0 12,7 19,7 13,11 15,18 10,14 5,18 7,11 1,7 8,7"/>
  </g>
  
  <!-- Star count text -->
  <text x="45" y="18" font-family="monospace" font-size="12" font-weight="bold" fill="#ffd93d">0</text>
  <text x="45" y="28" font-family="monospace" font-size="8" fill="#00ffff">STARS</text>
  
  <!-- Decorative line -->
  <line x1="35" y1="10" x2="35" y2="30" stroke="url(#starCountGrad)" stroke-width="1"/>
</svg>